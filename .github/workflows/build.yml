name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  VERSION: '2.3.7'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libcurl4-openssl-dev libssl-dev libsqlite3-dev

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package tarball
        run: |
          chmod +x packaging/build-tarball.sh
          packaging/build-tarball.sh "$VERSION" x86_64 build/avacli dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avacli-${{ env.VERSION }}-linux-x86_64
          path: dist/avacli-*.tar.gz

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja curl sqlite3

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix curl);$(brew --prefix sqlite3)" \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build

      - name: Package tarball
        run: |
          chmod +x packaging/build-tarball.sh
          packaging/build-tarball.sh "$VERSION" arm64 build/avacli dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avacli-${{ env.VERSION }}-macos-arm64
          path: dist/avacli-*.tar.gz

  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja curl sqlite3

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix curl);$(brew --prefix sqlite3)"
          cmake --build build

      - name: Package tarball
        run: |
          chmod +x packaging/build-tarball.sh
          packaging/build-tarball.sh "$VERSION" x86_64 build/avacli dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avacli-${{ env.VERSION }}-macos-x86_64
          path: dist/avacli-*.tar.gz

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Create vcpkg binary cache dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-cache"

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\vcpkg"
          cd "${{ github.workspace }}\vcpkg"
          git checkout 2024.12.16
          & .\bootstrap-vcpkg.bat

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-win-x64-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-x64-

      - name: Configure & build
        shell: pwsh
        run: |
          cmake -B build `
            "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
